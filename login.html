<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Graffiti Supply Store</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="texture-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card-urban p-5" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-5">
            <a href="index.html"><img src="assets/images/logo.svg" alt="Logo" style="height: 40px;"></a>
        </div>
        <h2 class="mb-4">WELCOME BACK</h2>
        <form>
            <div class="mb-3">
                <label class="form-label text-muted">Email / Username</label>
                <input type="text" class="form-control bg-dark border-secondary text-white p-3">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" class="form-control bg-dark border-secondary text-white p-3">
            </div>
            <button type="submit" class="btn-custom btn-primary-neon w-100 mb-4">LOG IN</button>
            <div class="text-center">
                <p class="small text-muted">Don't have an account? <a href="signup.html" style="color: var(--secondary-neon);">Join the crew</a></p>
                <a href="index.html" class="small text-muted">Back to home</a>
            </div>
        </form>
    </div>
</body>
</html>

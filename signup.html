<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Graffiti Supply Store</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="texture-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="auth-controls">
        <button class="btn btn-sm btn-outline" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button class="btn btn-sm btn-outline" id="rtl-toggle" title="Toggle RTL">RTL</button>
    </div>

    <div class="card-urban p-5" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-5">
            <a href="index.html"><img src="assets/images/logo.png" alt="Logo" style="width: 150px; height: 50px; object-fit: contain;"></a>
        </div>
        <h2 class="mb-4">JOIN THE CREW</h2>
        <form>
            <div class="mb-3">
                <label class="form-label text-muted">Full Name</label>
                <input type="text" class="form-control bg-dark border-secondary text-white p-3">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Email Address</label>
                <input type="email" class="form-control bg-dark border-secondary text-white p-3">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Create Password</label>
                <div class="password-group">
                    <input type="password" class="form-control bg-dark border-secondary text-white p-3">
                    <button type="button" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Confirm Password</label>
                <div class="password-group">
                    <input type="password" class="form-control bg-dark border-secondary text-white p-3">
                    <button type="button" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="terms">
                <label class="form-check-label small text-muted" for="terms">I agree to the terms of the graffiti code.</label>
            </div>
            <button type="submit" class="btn-custom btn-secondary-neon w-100 mb-4">SIGN UP</button>
            <div class="text-center">
                <p class="small text-muted mb-0">Already a member? <a href="login.html" class="auth-link" style="color: var(--secondary-neon);">Log in here</a></p>
            </div>

            <div class="social-login-container">
                <button type="button" class="btn btn-social">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
                <button type="button" class="btn btn-social">
                    <i class="fab fa-apple"></i> Continue with Apple
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
